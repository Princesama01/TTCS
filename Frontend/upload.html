<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend - Upload</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">TTCS Frontend</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="upload.html">Upload</a>
            <a href="documents.html">Documents</a>
            <a href="search.html">Search</a>
            <a href="compare.html">Compare</a>
            <a href="chat.html">Chat</a>
            <a href="stats.html">Stats</a>
            <a href="evaluation.html">Evaluation</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="card">
        <h2>Upload tài liệu</h2>
        <p class="muted">Hỗ trợ .docx / .pdf (tối đa 50MB)</p>
        <div class="row-wrap">
            <input id="fileInput" type="file" accept=".docx,.pdf">
            <button id="uploadBtn" class="btn btn-primary">Upload</button>
        </div>
        <div style="margin-top:12px;" class="progress">
            <div id="uploadProgress" class="progress-fill"></div>
        </div>
        <p id="uploadText" class="muted">0%</p>
        <p id="uploadResult" class="mono"></p>
    </section>

    <section class="card" style="margin-top:16px;">
        <h3>Pipeline status</h3>
        <div id="pipelineStatus" class="list"></div>
    </section>
</main>

<script src="scripts/common.js"></script>
<script src="scripts/upload.js"></script>
</body>
</html>
