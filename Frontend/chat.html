<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend - Chat</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">TTCS Frontend</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="upload.html">Upload</a>
            <a href="documents.html">Documents</a>
            <a href="search.html">Search</a>
            <a href="compare.html">Compare</a>
            <a href="chat.html">Chat</a>
            <a href="stats.html">Stats</a>
            <a href="evaluation.html">Evaluation</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="card">
        <h2>Ask AI</h2>
        <textarea id="question" placeholder="Nhập câu hỏi..."></textarea>
        <div class="grid grid-3">
            <input id="articleNo" type="text" placeholder="article_no (optional)">
            <input id="version" type="text" placeholder="version (vd: v1)">
            <select id="useContext">
                <option value="true">use context</option>
                <option value="false">no context</option>
            </select>
        </div>
        <div class="row-wrap" style="margin-top:10px;">
            <button id="askBtn" class="btn btn-primary">Ask</button>
        </div>
    </section>

    <section class="card" style="margin-top:16px;">
        <h3>Answer</h3>
        <div id="answer" class="mono"></div>
    </section>

    <section class="card" style="margin-top:16px;">
        <h3>Citations</h3>
        <div id="citations" class="list"></div>
    </section>
</main>

<script src="scripts/common.js"></script>
<script src="scripts/chat.js"></script>
</body>
</html>
