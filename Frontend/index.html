<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend - Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">TTCS Frontend</div>
        <nav class="nav">
            <a href="index.html">Dashboard</a>
            <a href="upload.html">Upload</a>
            <a href="documents.html">Documents</a>
            <a href="search.html">Search</a>
            <a href="compare.html">Compare</a>
            <a href="chat.html">Chat</a>
            <a href="stats.html">Stats</a>
            <a href="evaluation.html">Evaluation</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="grid grid-3">
        <section class="card">
            <h3>API</h3>
            <p id="apiStatus" class="badge warning">Đang kiểm tra...</p>
        </section>
        <section class="card">
            <h3>Pipeline</h3>
            <p id="pipelineStatus" class="badge warning">Đang kiểm tra...</p>
        </section>
        <section class="card">
            <h3>Ollama</h3>
            <p id="ollamaStatus" class="badge warning">Đang kiểm tra...</p>
        </section>
    </div>

    <section class="card" style="margin-top:16px;">
        <h2>Tổng quan hệ thống</h2>
        <div class="grid grid-3">
            <div>
                <div class="muted">Documents</div>
                <div id="documentsCount" style="font-size:28px;font-weight:700;">-</div>
            </div>
            <div>
                <div class="muted">Chunks</div>
                <div id="chunksCount" style="font-size:28px;font-weight:700;">-</div>
            </div>
            <div>
                <div class="muted">Last Updated</div>
                <div id="updatedAt" style="font-size:16px;font-weight:600;">-</div>
            </div>
        </div>
    </section>
</main>

<script src="scripts/common.js"></script>
<script src="scripts/index.js"></script>
</body>
</html>
