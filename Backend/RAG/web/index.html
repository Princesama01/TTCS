<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Q&A System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            position: relative;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .loading {
            display: flex;
            gap: 5px;
            padding: 15px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-container input:focus {
            border-color: #667eea;
        }

        .input-container button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-container button:hover {
            transform: scale(1.05);
        }

        .input-container button:active {
            transform: scale(0.95);
        }

        .sources {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 12px;
        }

        .source-item {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-radius: 4px;
        }

        .stats {
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            color: #666;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG Document Q&A</h1>
            <p>Hệ thống hỏi đáp thông minh dựa trên tài liệu nội bộ</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">
                    <div>Xin chào! Tôi là trợ lý AI của bạn. Tôi có thể giúp bạn tra cứu thông tin từ tài liệu nội bộ.
                        Hãy đặt câu hỏi!</div>
                    <div class="message-time" id="time"></div>
                </div>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">0</div>
                <div>Câu hỏi</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="avgTime">0s</div>
                <div>Thời gian TB</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="documents">-</div>
                <div>Tài liệu</div>
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="questionInput" placeholder="Nhập câu hỏi của bạn..."
                onkeypress="handleKeyPress(event)" />
            <button onclick="sendQuestion()">Gửi</button>
        </div>
    </div>

    <script>
        let conversationId = generateUUID();
        let questionCount = 0;
        let totalTime = 0;

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function getCurrentTime() {
            return new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendQuestion();
            }
        }

        function addMessage(content, isUser, time, sources = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            let sourcesHtml = '';
            if (sources && sources.length > 0) {
                sourcesHtml = '<div class="sources"><strong>📚 Nguồn:</strong>';
                sources.forEach((source, idx) => {
                    sourcesHtml += `
                        <div class="source-item">
                            ${idx + 1}. ${source.filename} (Trang ${source.page})
                            ${source.score ? ` - Score: ${source.score.toFixed(2)}` : ''}
                        </div>
                    `;
                });
                sourcesHtml += '</div>';
            }

            messageDiv.innerHTML = `
                <div class="message-content">
                    <div>${content}</div>
                    ${sourcesHtml}
                    <div class="message-time">${time}</div>
                </div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showLoading() {
            const chatContainer = document.getElementById('chatContainer');
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="message-content">
                    <div class="loading">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) {
                loading.remove();
            }
        }

        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();

            if (!question) return;

            // Add user message
            addMessage(question, true, getCurrentTime());
            input.value = '';

            // Show loading
            showLoading();

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        conversation_id: conversationId,
                        language: 'vi',
                        return_sources: true
                    })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();

                // Hide loading
                hideLoading();

                // Add assistant message
                addMessage(
                    data.answer,
                    false,
                    getCurrentTime(),
                    data.source_documents
                );

                // Update stats
                questionCount++;
                totalTime += data.total_time;
                updateStats(data);

            } catch (error) {
                hideLoading();
                addMessage(
                    '❌ Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại sau.',
                    false,
                    getCurrentTime()
                );
                console.error('Error:', error);
            }
        }

        function updateStats(data) {
            document.getElementById('totalQuestions').textContent = questionCount;
            document.getElementById('avgTime').textContent =
                (totalTime / questionCount).toFixed(1) + 's';
        }

        async function loadSystemStats() {
            try {
                const response = await fetch('/api/v1/statistics');
                const data = await response.json();

                document.getElementById('documents').textContent =
                    data.vector_store.total_vectors || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load stats on page load
        loadSystemStats();

        // Set initial time
        document.getElementById('time').textContent = getCurrentTime();
    </script>
</body>

</html>
